# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Fail CI on all warnings
  RUSTFLAGS: "-Dwarnings"
  TARGETS_TO_BUILD: x86_64-unknown-linux-gnu

jobs:

  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/setup-env/
      - run: just lint
      - run: just test
      - name: Build and release
        run: |
          version="$(./target/x86_64-unknown-linux-gnu/release/badger --version | cut -d" " -f2)"
          if [ "${version}" == "" ]; then
            echo "error determining version"
            exit 1
          fi
          mkdir artifacts
          for target in ${TARGETS_TO_BUILD}; do
            just build release "${target}"
            mv "target/${target}/release/badger" "artifacts/badger-${target}"
          done
          gh release create "v${version}" \
            --draft \
            --generate-notes \
            --fail-on-no-commits \
            artifacts/*
