# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  schedule:
    # because nushell is still not stable...
    - cron: "17 3 * * 0"  # every Sunday at 03:17 UTC <https://crontab.guru/#17_3_*_*_0>

permissions:
  contents: read

jobs:

  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - uses: hustcer/setup-nu@ccd5bb5426b05a32009c2ba967946231f3919c97  # v3.25
        with:
          check-latest: true  # intentionally not pinning while nushell is unstable
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5  # v2.82.0
        with:
          tool: just@1.51.0,shfmt@3.13.1

      - name: Setup Bats
        run: |
          tmp_dir="$(mktemp --directory)"

          # clone v1.13.0
          git clone \
            --revision 3bca150ec86275d6d9d5a4fd7d48ab8b6c6f3d87 \
            --depth 1 \
            https://github.com/bats-core/bats-core.git \
            "${tmp_dir}"

          cd "${tmp_dir}"
          mkdir --parent ~/.local/share/bats
          ./install.sh ~/.local/share/bats

          mkdir --parent ~/.local/bin
          ln --symbolic ~/.local/share/bats/bin/bats ~/.local/bin/bats
          echo ~/.local/bin >>"${GITHUB_PATH}"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0

      - name: Install yamlfmt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -SsfL https://philcrockett.com/yolo/v2.sh \
            | bash -s -- yamlfmt

      # borrowed /modified the following from <https://github.com/pre-commit/action/blob/main/action.yml>
      - run: python -m pip install pre-commit
      - run: python -m pip freeze --local
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - run: just lint
      - run: just test
